name: Release (EAS)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        type: choice
        options:
          - preview
          - production
        default: preview
        required: true
      platform:
        description: Build target platform
        type: choice
        options:
          - all
          - android
          - ios
        default: all
        required: true
      channel:
        description: EAS Update channel (optional)
        type: string
        required: false
      update_message:
        description: EAS Update message (optional)
        type: string
        required: false
      submit:
        description: Submit to stores after build
        type: boolean
        default: false
        required: true
      run_update:
        description: Run eas update after build
        type: boolean
        default: false
        required: true

jobs:
  release:
    name: Build / Submit / Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build
        run: >-
          eas build
          --non-interactive
          --profile ${{ github.event.inputs.profile }}
          --platform ${{ github.event.inputs.platform }}
          --wait

      - name: EAS Submit (Android)
        if: ${{ github.event.inputs.submit == 'true' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all') }}
        run: >-
          eas submit
          --non-interactive
          --profile ${{ github.event.inputs.profile }}
          --platform android

      - name: EAS Submit (iOS)
        if: ${{ github.event.inputs.submit == 'true' && (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all') }}
        run: >-
          eas submit
          --non-interactive
          --profile ${{ github.event.inputs.profile }}
          --platform ios

      - name: EAS Update
        if: ${{ github.event.inputs.run_update == 'true' && github.event.inputs.channel != '' }}
        run: >-
          eas update
          --non-interactive
          --channel "${{ github.event.inputs.channel }}"
          --message "${{ github.event.inputs.update_message || format('Update from {0}', github.sha) }}"
